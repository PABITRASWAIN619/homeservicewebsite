{% load static %}
<!doctype html>
<html>
  <head>
    <title>Login | Secure Access</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
        background-size: 400% 400%;
        animation: gradient 15s ease infinite;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      @keyframes gradient {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .login-box {
        width: 400px;
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(15px);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: white;
      }

      h2 {
        text-align: center;
        margin-bottom: 25px;
        font-weight: 300;
      }

      .input-box {
        margin-bottom: 20px;
      }
      .input-box input {
        width: 100%;
        padding: 15px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        color: white;
        outline: none;
      }

      .btn {
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: 10px;
        background: #fff;
        color: #e73c7e;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        margin-bottom: 10px;
      }

      /* Blinking/Pulsing Effect for Back Button */
      .back-btn {
        display: block;
        width: 100%;
        text-align: center;
        padding: 12px;
        background: rgba(0, 0, 0, 0.2);
        color: white;
        text-decoration: none;
        border-radius: 10px;
        font-size: 14px;
        animation: blink 2s infinite;
      }

      @keyframes blink {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
        100% {
          opacity: 1;
        }
      }

      .toggle-section {
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
      }
      .toggle-section a {
        color: #fff;
        text-decoration: underline;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="login-box">
      <h2 id="form-title">Login</h2>
      <form method="POST">
        {% csrf_token %}
        <div class="input-box">
          <input
            type="email"
            name="email"
            placeholder="Email Address"
            required
          />
        </div>
        <div class="input-box" id="pass-field">
          <input type="password" name="password" placeholder="Password" />
        </div>

        <button type="submit" class="btn" id="submit-btn">Login</button>

        <a href="{% url 'home' %}" class="back-btn">← Back To Home</a>
      </form>

      <div class="toggle-section">
        <p id="mode-text">
          Don't use password? <a onclick="toggleMode()">Login with OTP</a>
        </p>
      </div>
    </div>

    <script>
      let isOtpMode = false;
      function toggleMode() {
        isOtpMode = !isOtpMode;
        const title = document.getElementById("form-title");
        const passField = document.getElementById("pass-field");
        const btn = document.getElementById("submit-btn");
        const modeText = document.getElementById("mode-text");

        if (isOtpMode) {
          title.innerText = "Email OTP Login";
          passField.style.display = "none";
          btn.innerText = "Send OTP";
          modeText.innerHTML =
            'Back to <a onclick="toggleMode()">Password Login</a>';
        } else {
          title.innerText = "Login";
          passField.style.display = "block";
          btn.innerText = "Login";
          modeText.innerHTML =
            'Don\'t use password? <a onclick="toggleMode()">Login with OTP</a>';
        }
      }
    </script>
  </body>
</html>
