{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Forgot Password</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            overflow:hidden;

            background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#6a11cb,#2575fc);
            background-size:400% 400%;
            animation:bgAnimation 15s ease infinite;

        }

        @keyframes bgAnimation{

            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}

        }

        body::before,
        body::after{

            content:'';
            position:absolute;
            border-radius:50%;
            filter:blur(40px);
            animation:float 8s infinite ease-in-out;

        }

        body::before{

            width:280px;
            height:280px;
            background:#00d4ff;
            top:-80px;
            left:-80px;

        }

        body::after{

            width:260px;
            height:260px;
            background:#ff0099;
            bottom:-80px;
            right:-80px;

        }

        @keyframes float{

            0%,100%{
                transform:translateY(0);
            }

            50%{
                transform:translateY(40px);
            }

        }

        .forgot-box{

            width:420px;

            padding:40px;

            background:rgba(255,255,255,.12);

            backdrop-filter:blur(18px);

            border-radius:25px;

            border:1px solid rgba(255,255,255,.25);

            box-shadow:0 8px 32px rgba(0,0,0,.35);

        }

        .forgot-box h2{

            color:white;
            text-align:center;
            margin-bottom:10px;

        }

        .forgot-box p{

            color:#ddd;
            text-align:center;
            margin-bottom:25px;
            font-size:14px;

        }

        .input-box{

            margin-bottom:20px;

        }

        .input-box input{

            width:100%;

            padding:15px;

            background:rgba(255,255,255,.15);

            border:1px solid rgba(255,255,255,.25);

            border-radius:12px;

            color:white;

            outline:none;

            font-size:15px;

        }

        .input-box input::placeholder{

            color:#ddd;

        }

        .input-box input:focus{

            border-color:#00d4ff;

            box-shadow:0 0 15px #00d4ff;

        }

        .btn{

            width:100%;

            padding:15px;

            border:none;

            border-radius:12px;

            background:linear-gradient(45deg,#00d4ff,#6a11cb);

            color:white;

            font-size:16px;

            font-weight:600;

            cursor:pointer;

            transition:.3s;

        }

        .btn:hover{

            transform:translateY(-3px);

            box-shadow:0 10px 20px rgba(0,212,255,.4);

        }

        .back{

            display:block;

            margin-top:15px;

            text-align:center;

            text-decoration:none;

            color:white;

            padding:14px;

            border-radius:12px;

            background:rgba(255,255,255,.12);

            border:1px solid rgba(255,255,255,.2);

            transition:.3s;

        }

        .back:hover{

            background:white;

            color:#6a11cb;

        }

        .alert{

            padding:12px;

            border-radius:10px;

            margin-bottom:20px;

            text-align:center;

            color:white;

        }

        .success{
            background:#28a745;
        }

        .error{
            background:#dc3545;
        }

        @media(max-width:500px){

            .forgot-box{

                width:92%;
                padding:30px;

            }

        }

    </style>

</head>

<body>

<div class="forgot-box">

    <h2>Forgot Password</h2>

    <p>
        Enter your registered email and create a new password.
    </p>

    {% if messages %}
        {% for message in messages %}
            <div class="alert {% if message.tags == 'success' %}success{% else %}error{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <!-- Email -->
        <div class="input-box">
            <input
                type="email"
                name="email"
                placeholder="Registered Email"
                required>
        </div>

        <!-- New Password -->
        <div class="input-box" style="position:relative;">

            <input
                type="password"
                id="new_password"
                name="new_password"
                placeholder="New Password"
                required>

            <span
                onclick="togglePassword('new_password',this)"
                style="position:absolute;right:15px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:20px;color:white;">
                👁
            </span>

        </div>

        <!-- Confirm Password -->
        <div class="input-box" style="position:relative;">

            <input
                type="password"
                id="confirm_password"
                name="confirm_password"
                placeholder="Confirm Password"
                required>

            <span
                onclick="togglePassword('confirm_password',this)"
                style="position:absolute;right:15px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:20px;color:white;">
                👁
            </span>

        </div>

        <button type="submit" class="btn">
            Reset Password
        </button>

    </form>

    <a href="{% url 'login' %}" class="back">
        ← Back to Login
    </a>

</div>

<script>

function togglePassword(id,icon){

    let input=document.getElementById(id);

    if(input.type==="password"){

        input.type="text";
        icon.innerHTML="🙈";

    }else{

        input.type="password";
        icon.innerHTML="👁";

    }

}

document.querySelector("form").addEventListener("submit",function(e){

    let p1=document.getElementById("new_password").value;
    let p2=document.getElementById("confirm_password").value;

    if(p1!==p2){

        alert("Passwords do not match.");
        e.preventDefault();

    }

});

</script>
</body>
</html>
