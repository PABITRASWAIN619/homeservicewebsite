{% extends 'worker/base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Verify Customer OTP</h4>
        </div>

        <div class="card-body">

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-info">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <p>
                Enter the OTP provided by the customer to complete the job.
            </p>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">
                        Customer OTP
                    </label>

                    <input
                        type="text"
                        name="otp"
                        class="form-control"
                        maxlength="6"
                        required
                    >
                </div>

                <button
                    type="submit"
                    class="btn btn-success"
                >
                    Verify OTP
                </button>

            </form>

        </div>
    </div>

</div>

{% endblock %}
