{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Worker Signup - Step 3</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <style>
      :root {
        --primary-sky: #38bdf8;
        --royal-purple: #6366f1;
        --error-rose: #f43f5e;
        --success-emerald: #10b981;
        --gradient-premium: linear-gradient(
          135deg,
          #0f172a 0%,
          #1e1b4b 50%,
          #311042 100%
        );
        --card-bg: rgba(17, 24, 39, 0.75);
        --input-bg: #0b1220;
        --border-color: #334155;
        --text-muted: #94a3b8;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: var(--gradient-premium) !important;
        background-attachment: fixed !important;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .card {
        width: 100%;
        max-width: 440px;
        background: var(--card-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        padding: 40px 30px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        text-align: center;
      }

      .step-progress-tracker {
        display: flex;
        justify-content: center;
        gap: 6px;
        margin-bottom: 25px;
      }

      .progress-bar-segment {
        height: 4px;
        width: 40px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.1);
      }

      .progress-bar-segment.completed {
        background: var(--success-emerald);
      }

      .progress-bar-segment.active {
        background: linear-gradient(
          90deg,
          var(--primary-sky),
          var(--royal-purple)
        );
        box-shadow: 0 0 10px rgba(56, 189, 248, 0.4);
      }

      h2 {
        color: #ffffff;
        font-size: 26px;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin-bottom: 8px;
      }

      .subtitle-desc {
        color: var(--text-muted);
        font-size: 14px;
        margin-bottom: 25px;
      }

      /* CAMERA OVERLAY CHASSIS SCANNER */
      .video-container {
        position: relative;
        width: 100%;
        border-radius: 16px;
        overflow: hidden;
        border: 2px solid var(--border-color);
        background: #000;
        aspect-ratio: 4 / 3;
        margin-bottom: 20px;
      }

      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .camera-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 25px solid rgba(11, 18, 32, 0.6);
        box-sizing: border-box;
        pointer-events: none;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .scanner-ring {
        width: 180px;
        height: 180px;
        border: 2px dashed rgba(56, 189, 248, 0.5);
        border-radius: 50%;
        box-shadow: 0 0 0 9999px rgba(11, 18, 32, 0.3);
      }

      /* INTERACTIVE BUTTON ARRAYS */
      .btn-capture {
        width: 100%;
        padding: 14px;
        background: #1e293b;
        border: 1px solid var(--border-color);
        color: white;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: all 0.25s ease;
        margin-bottom: 20px;
      }

      .btn-capture:hover {
        background: #273549;
        border-color: var(--primary-sky);
        color: var(--primary-sky);
      }

      .preview-wrapper {
        display: none;
        justify-content: center;
        margin-bottom: 25px;
        animation: fadeIn 0.4s ease;
      }

      .preview {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        border: 3px solid var(--success-emerald);
        object-fit: cover;
        box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
      }

      button[type="submit"] {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        border: none;
        color: white;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        transition: all 0.3s ease;
      }

      button[type="submit"]:hover {
        background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(37, 99, 235, 0.45);
      }

      .feedback-msg {
        font-size: 13px;
        font-weight: 500;
        margin-top: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.9);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @media (max-width: 480px) {
        .card {
          padding: 30px 20px;
        }
        h2 {
          font-size: 22px;
        }
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="step-progress-tracker">
        <div class="progress-bar-segment completed"></div>
        <div class="progress-bar-segment completed"></div>
        <div class="progress-bar-segment active"></div>
        <div class="progress-bar-segment"></div>
      </div>

      <h2>Face Verification</h2>
      <p class="subtitle-desc">Step 3 of 4 – Capture real-time bio telemetry</p>

      <div class="video-container">
        <video id="video" autoplay playsinline></video>
        <div class="camera-overlay">
          <div class="scanner-ring"></div>
        </div>
      </div>

      <button type="button" class="btn-capture" onclick="capture()">
        <i class="bi bi-camera-fill"></i> Capture Identity Snap
      </button>

      <div class="preview-wrapper" id="previewWrapper">
        <img
          id="preview"
          class="preview"
          alt="Identity snapshot token payload preview"
        />
      </div>

      <form method="POST" id="captureForm" onsubmit="return validateCapture();">
        {% csrf_token %}
        <input type="hidden" name="face_image" id="face_image" />

        <button type="submit">
          Confirm & Continue <i class="bi bi-arrow-right-short fs-5"></i>
        </button>

        <div class="feedback-msg" id="feedbackMessage"></div>
      </form>
    </div>

    <script>
      const video = document.getElementById("video");
      const previewWrapper = document.getElementById("previewWrapper");
      const preview = document.getElementById("preview");
      const hiddenInput = document.getElementById("face_image");
      const feedback = document.getElementById("feedbackMessage");

      // Intitalize camera stream pipeline
      navigator.mediaDevices
        .getUserMedia({
          video: { width: 640, height: 480, facingMode: "user" },
        })
        .then((stream) => {
          video.srcObject = stream;
        })
        .catch((err) => {
          feedback.innerHTML = `<i class="bi bi-x-circle-fill text-danger"></i> <span style="color: var(--error-rose)">Camera subsystem access denied!</span>`;
        });

      // Capture Image Logic Matrix
      function capture() {
        if (!video.srcObject) return;

        const canvas = document.createElement("canvas");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        const ctx = canvas.getContext("2d");
        // Flip image horizontally for a natural mirror reflection
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = canvas.toDataURL("image/png");
        hiddenInput.value = imageData;

        preview.src = imageData;
        previewWrapper.style.display = "flex";

        feedback.innerHTML = `<i class="bi bi-check-circle-fill text-success"></i> <span style="color: var(--success-emerald)">Biometric signature locked cleanly.</span>`;
      }

      function validateCapture() {
        if (!hiddenInput.value) {
          feedback.innerHTML = `<i class="bi bi-exclamation-triangle-fill text-warning"></i> <span style="color: #fbbf24">Please run the camera capture pass first!</span>`;
          return false;
        }
        return true;
      }
    </script>
  </body>
</html>
