{% extends 'customer/base.html' %}
{% block content %}

<style>
.edit-card{
    background:#fff;
    border-radius:20px;
    padding:30px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.profile-image{
    width:170px;
    height:170px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid #0d6efd;
}

.save-btn{
    background:linear-gradient(135deg,#198754,#20c997);
    border:none;
    border-radius:50px;
    padding:12px 30px;
    color:white;
    font-weight:bold;
}

.cancel-btn{
    border-radius:50px;
}
</style>

<div class="container mt-4">

    <div class="card edit-card">

        <h2 class="text-center mb-4">
            ✏️ Edit Profile
        </h2>

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            <div class="text-center mb-4">

                {% if profile.image %}
                    <img
                        id="preview"
                        src="{{ profile.image.url }}"
                        class="profile-image">
                {% else %}
                    <img
                        id="preview"
                        src="https://via.placeholder.com/170"
                        class="profile-image">
                {% endif %}

                <div class="mt-3">

                    <input
                        type="file"
                        id="profile_image"
                        name="profile_image"
                        class="form-control">

                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label>First Name</label>

                    <input
                        type="text"
                        name="first_name"
                        class="form-control"
                        value="{{ request.user.first_name }}">

                </div>

                <div class="col-md-6 mb-3">

                    <label>Last Name</label>

                    <input
                        type="text"
                        name="last_name"
                        class="form-control"
                        value="{{ request.user.last_name }}">

                </div>

                <div class="col-md-6 mb-3">

                    <label>Username</label>

                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        value="{{ request.user.username }}">

                </div>

                <div class="col-md-6 mb-3">

                    <label>Email</label>

                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        value="{{ request.user.email }}">

                </div>

                <div class="col-md-6 mb-3">

                    <label>Phone</label>

                    <input
                        type="text"
                        name="phone"
                        class="form-control"
                        value="{{ profile.phone }}">

                </div>

                <div class="col-md-6 mb-3">

                    <label>City</label>

                    <input
                        type="text"
                        name="city"
                        class="form-control"
                        value="{{ profile.city }}">

                </div>

            </div>

            <div class="mb-3">

                <label>Address</label>

                <textarea
                    name="address"
                    rows="4"
                    class="form-control">{{ profile.address }}</textarea>

            </div>

            <div class="text-center mt-4">

                <button type="submit" class="save-btn">
                    💾 Save Changes
                </button>

                <a href="{% url 'profile' %}"
                   class="btn btn-secondary cancel-btn">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

<script>

document.getElementById("profile_image").onchange=function(){

    const file=this.files[0];

    if(file){

        document.getElementById("preview").src=
        URL.createObjectURL(file);

    }

}

</script>

{% endblock %}
