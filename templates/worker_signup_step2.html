{% load static %}

<link
href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
rel="stylesheet"
/>

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
/>


<style>

:root{
    --primary:#38bdf8;
    --purple:#6366f1;
    --success:#10b981;
    --danger:#f43f5e;

    --bg:
    linear-gradient(
        135deg,
        #020617,
        #1e1b4b,
        #312e81
    );

    --card:rgba(15,23,42,.85);
    --input:#020617;
    --border:#334155;
}


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    font-family:
    "Plus Jakarta Sans",
    sans-serif;

    background:var(--bg);
    background-attachment:fixed;

    overflow-x:hidden;
}


/* Background Animation */

body::before{

    content:"";

    position:fixed;

    width:400px;
    height:400px;

    background:#38bdf8;

    filter:blur(150px);

    opacity:.25;

    top:-100px;
    left:-100px;

    animation:
    moveGlow 8s infinite alternate;

}



@keyframes moveGlow{

from{
transform:translate(0,0);
}

to{
transform:translate(250px,150px);
}

}




.card{


width:100%;
max-width:460px;


background:var(--card);

padding:40px 32px;


border-radius:28px;


border:1px solid rgba(255,255,255,.1);


backdrop-filter:blur(20px);


box-shadow:
0 30px 80px rgba(0,0,0,.5);


animation:
fade .6s ease;


}


@keyframes fade{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:none;
}

}



/* Step */

.step-progress-tracker{


display:flex;
justify-content:center;

gap:8px;

margin-bottom:25px;

}



.progress-bar-segment{


width:45px;
height:5px;

border-radius:10px;

background:#334155;

}



.progress-bar-segment.active{

background:
linear-gradient(
90deg,
#38bdf8,
#6366f1
);

box-shadow:
0 0 15px #38bdf8;

}




h2{

text-align:center;

color:white;

font-size:28px;

margin-bottom:8px;

}



.subtitle-desc{


text-align:center;

color:#94a3b8;

font-size:14px;

margin-bottom:30px;


}




.input-box{

margin-bottom:22px;

}



.input-box label{


display:block;

color:#e2e8f0;

font-size:12px;

font-weight:700;

letter-spacing:.8px;

margin-bottom:8px;

text-transform:uppercase;

}



.input-wrapper{


position:relative;


}



.input-icon{


position:absolute;

left:15px;

top:50%;

transform:translateY(-50%);

font-size:18px;

color:#94a3b8;

transition:.3s;


}



input,
select{


width:100%;


padding:

15px 45px;


background:var(--input);


border:

1px solid var(--border);


border-radius:14px;


color:white;


font-size:15px;


outline:none;


transition:.3s;


}



input::placeholder{

color:#64748b;

}



input:focus,
select:focus{


border-color:var(--primary);


box-shadow:

0 0 0 4px rgba(56,189,248,.15);


}



input:focus + .input-icon{


color:var(--primary);

}



select option{

background:#020617;

color:white;

}



/* Address */


.address-wrapper{


display:flex;

gap:12px;

align-items:center;

}



.address-input{

flex:1;

}




.location-btn{


width:55px;

height:55px;


border:none;

border-radius:15px;


background:

linear-gradient(
135deg,
#2563eb,
#1d4ed8
);


color:white;


font-size:22px;


cursor:pointer;


display:flex;

align-items:center;

justify-content:center;


transition:.3s;


box-shadow:

0 10px 25px rgba(37,99,235,.35);

}



.location-btn:hover{


transform:
translateY(-3px);


box-shadow:

0 15px 30px rgba(37,99,235,.5);

}



.location-btn:active{

transform:scale(.95);

}





/* Validation */


.is-invalid-field input,
.is-invalid-field select{


border-color:var(--danger);


box-shadow:
0 0 0 4px rgba(244,63,94,.15);


}



.is-valid-field input,
.is-valid-field select{


border-color:var(--success);


}



.field-error-feedback{


display:none;

color:#fb7185;

font-size:12px;

margin-top:6px;


}



/* Button */


button[type="submit"]{


width:100%;


padding:15px;


margin-top:15px;


border:none;


border-radius:15px;


background:

linear-gradient(
135deg,
#2563eb,
#6366f1
);


color:white;


font-size:16px;

font-weight:700;


cursor:pointer;


transition:.3s;


}



button[type="submit"]:hover{


transform:translateY(-3px);


box-shadow:

0 15px 30px rgba(99,102,241,.4);


}



/* Mobile */


@media(max-width:480px){


.card{

padding:30px 20px;

}



h2{

font-size:23px;

}



.address-wrapper{

gap:8px;

}



.location-btn{

width:50px;

height:50px;

}



}


</style>





<div class="card">


<div class="step-progress-tracker">

<div class="progress-bar-segment completed"></div>
<div class="progress-bar-segment active"></div>
<div class="progress-bar-segment"></div>
<div class="progress-bar-segment"></div>

</div>



<h2>
Worker Signup
</h2>


<p class="subtitle-desc">
Step 2 of 4 – Professional Core Specifications
</p>




<form method="POST" id="serviceDetailsForm">

{% csrf_token %}



<div class="input-box" id="serviceBox">


<label>
Service Allocation Type
</label>


<div class="input-wrapper">


<i class="bi bi-briefcase-fill input-icon"></i>


<select 
name="service_type"
id="serviceSelect"
required>


<option value="">
Select Domain Specialization
</option>


<option>Electrician</option>

<option>Plumber</option>

<option>AC Repair</option>

<option>Carpenter</option>

<option>Painter</option>

<option>Cleaning Service</option>

<option>Mobile Repair</option>


</select>

</div>


<div class="field-error-feedback" id="serviceError"></div>


</div>





<div class="input-box" id="addressBox">


<label>
Full Operational Address
</label>



<div class="address-wrapper">


<div class="address-input">


<div class="input-wrapper">


<i class="bi bi-house-door-fill input-icon"></i>


<input

type="text"

name="address"

id="addressInput"

placeholder="Click location button or enter address"

required

>


</div>


</div>




<button

type="button"

class="location-btn"

onclick="getCurrentLocation()"

>

<i class="bi bi-geo-alt-fill"></i>

</button>



</div>



<input 
type="hidden"
name="latitude"
id="latitude"
>


<input 
type="hidden"
name="longitude"
id="longitude"
>


<div class="field-error-feedback"
id="addressError">
</div>


</div>







<div class="input-box" id="experienceBox">


<label>
Years of Trade Experience
</label>


<div class="input-wrapper">


<i class="bi bi-award-fill input-icon"></i>


<input

type="number"

name="experience"

id="experienceInput"

placeholder="Example: 3"

min="0"

max="45"

required

>


</div>


<div class="field-error-feedback"
id="experienceError">
</div>


</div>





<button type="submit">

Continue Next Step

<i class="bi bi-arrow-right"></i>

</button>




</form>


</div>






<script>


function getCurrentLocation(){


if(!navigator.geolocation){

alert(
"Geolocation not supported"
);

return;

}



navigator.geolocation.getCurrentPosition(

async function(position){


let lat =
position.coords.latitude;


let lng =
position.coords.longitude;



document.getElementById("latitude").value=lat;

document.getElementById("longitude").value=lng;



try{


let response =
await fetch(

`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`

);



let data =
await response.json();



document.getElementById("addressInput").value =
data.display_name;



}

catch(error){


alert(
"Unable to fetch address"
);


}



},



function(){


alert(
"Location permission denied"
);


}



);


}





document
.getElementById("serviceDetailsForm")
.addEventListener(
"submit",
function(e){



let valid=true;



let service=
document.getElementById("serviceSelect");


let address=
document.getElementById("addressInput");


let exp=
document.getElementById("experienceInput");




if(!service.value){

showError(
"serviceBox",
"serviceError",
"Please select service"
);

valid=false;

}




if(address.value.trim().length<8){


showError(
"addressBox",
"addressError",
"Enter complete address"
);


valid=false;


}




if(exp.value<0 || exp.value==""){


showError(
"experienceBox",
"experienceError",
"Enter valid experience"
);


valid=false;


}




if(!valid){

e.preventDefault();

}


});





function showError(box,error,msg){


let b=document.getElementById(box);

let e=document.getElementById(error);


b.classList.add("is-invalid-field");


e.innerHTML=
"<i class='bi bi-exclamation-circle'></i> "+msg;


e.style.display="block";


}


</script>
